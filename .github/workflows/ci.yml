name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint · Test · Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit / component tests (Vitest)
        run: npm run test
        env:
          # Vitest outputs to stdout by default; FORCE_COLOR keeps readable CI logs
          FORCE_COLOR: '1'

      - name: Build
        run: npm run build

      - name: Upload build artifact (dist/)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dist-${{ github.sha }}
          path: dist/
          retention-days: 14

  e2e:
    name: Playwright E2E + screenshots
    runs-on: ubuntu-latest
    # Run after verify so we only spend Playwright time on passing builds
    needs: verify

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build (for vite preview)
        run: npm run build

      - name: Run Playwright E2E tests
        run: npx playwright test
        env:
          # Ensure Playwright knows it's running in CI
          CI: 'true'

      - name: Upload Playwright screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-screenshots-${{ github.sha }}
          path: |
            e2e/screenshots/
            playwright-report/
          retention-days: 30

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ github.sha }}
          path: playwright-report/
          retention-days: 30
